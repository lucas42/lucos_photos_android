# Note: this project does not use the standard lucos/deploy orb because the output is a
# sideloaded Android APK rather than a Docker image pushed to a registry. There is no
# deploy step — the APK is stored as a CI artifact and signed + installed manually.
version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/android:2025.01
    steps:
      - checkout
      - run:
          name: Run unit tests
          command: ./gradlew test
  build-apk:
    docker:
      - image: cimg/android:2025.01
    steps:
      - checkout
      - run:
          name: Build release APK
          command: ./gradlew assembleRelease
      - store_artifacts:
          path: app/build/outputs/apk/release
          destination: apk
  release-apk:
    docker:
      - image: cimg/android:2025.01-node
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "b7:75:7e:64:66:44:40:06:95:b4:ad:cd:07:a7:6f:08"
      - lucos/fetch-publish-creds
      - run:
          name: Fetch production envfile
          command: |
            scp -s -P 2202 -o BatchMode=yes docker-deploy@creds.l42.eu:$CIRCLE_PROJECT_REPONAME/production/.env .
      - lucos/calc-version
      - run:
          name: Decode keystore
          command: |
            set -a && source .env && set +a
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/lucos-photos.keystore
      - run:
          name: Build and sign release APK
          command: |
            source $BASH_ENV
            set -a && source .env && set +a
            export ANDROID_KEYSTORE_FILE=/tmp/lucos-photos.keystore
            export APP_VERSION=$NEXT_VERSION
            ./gradlew assembleRelease
      - run:
          name: Remove keystore
          command: rm -f /tmp/lucos-photos.keystore
          when: always
      - store_artifacts:
          path: app/build/outputs/apk/release
          destination: apk
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - build-apk:
          requires:
            - test
          filters:
            branches:
              ignore:
                - main
      - release-apk:
          requires:
            - test
          filters:
            branches:
              only:
                - main
