version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/android:2025.01
    steps:
      - checkout
      - run:
          name: Run unit tests
          command: ./gradlew test
  build-apk:
    docker:
      - image: cimg/android:2025.01
    steps:
      - checkout
      - run:
          name: Build release APK
          command: ./gradlew assembleRelease
      - store_artifacts:
          path: app/build/outputs/apk/release
          destination: apk
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - build-apk:
          requires:
            - test
