# Note: this project does not use the standard lucos/deploy orb because the output is a
# sideloaded Android APK rather than a Docker image pushed to a registry. There is no
# deploy step — the APK is stored as a CI artifact and signed + installed manually.
version: 2.1
jobs:
  test:
    docker:
      - image: cimg/android:2025.01
    steps:
      - checkout
      - run:
          name: Run unit tests
          command: ./gradlew test
  build-apk:
    docker:
      - image: cimg/android:2025.01
    steps:
      - checkout
      - run:
          name: Build release APK
          command: ./gradlew assembleRelease
      - store_artifacts:
          path: app/build/outputs/apk/release
          destination: apk
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - build-apk
